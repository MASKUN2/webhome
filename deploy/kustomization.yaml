# Argo CD 가 watch 하는 GitOps 소스. CI(.github/workflows/deploy.yml)가 빌드 후
# `kustomize edit set image ...` 로 아래 image 의 newTag(=commit sha)를 갱신 커밋한다.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps
resources:
- manifest.yaml
images:
- name: webhome
  newName: ghcr.io/maskun2/webhome
  newTag: 38e51aff74897026c51a64a77250521092d7e42d
