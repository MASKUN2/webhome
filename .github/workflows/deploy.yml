name: build-and-deploy

# main 에 앱 코드가 바뀌면: amd64 이미지 빌드 → GHCR 푸시 → deploy/ 태그 bump 커밋.
# bump 커밋은 deploy/ 만 건드리므로(아래 paths 에서 제외) 재트리거되지 않음.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # deploy/ 태그 bump 커밋 푸시
  packages: write # GHCR 푸시

env:
  REGISTRY: ghcr.io
  OWNER: maskun2 # GHCR 는 소문자
  IMAGE: webhome

jobs:
  build:
    runs-on: ubuntu-latest # amd64 네이티브
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -sfLo /tmp/k.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          sudo tar -xzf /tmp/k.tar.gz -C /usr/local/bin
      - name: Bump image tag to commit sha
        working-directory: deploy
        run: kustomize edit set image webhome=${REGISTRY}/${OWNER}/${IMAGE}:${GITHUB_SHA}
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/kustomization.yaml
          git commit -m "ci: bump webhome image to ${GITHUB_SHA:0:7}" || { echo "no changes"; exit 0; }
          git push
